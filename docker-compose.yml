services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-beauty_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-beauty_password}
      POSTGRES_DB: ${POSTGRES_DB:-beauty_app}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-beauty_user} -d ${POSTGRES_DB:-beauty_app}"]
      interval: 5s
      timeout: 5s
      retries: 10
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://beauty_user:beauty_password@db:5432/beauty_app?schema=public}
      APP_URL: ${APP_URL:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-troque-essa-chave-em-producao}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
volumes:
  postgres_data:
